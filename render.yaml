services:
  - type: web
    name: stock-analyzer-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: FINNHUB_API_KEY
        sync: false
      - key: TWELVEDATA_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
